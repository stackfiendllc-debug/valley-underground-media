<style>

--orange:#ff5e00;

body{

font-family:Arial,sans-serif;

background:
radial-gradient(circle at top left, rgba(255,94,0,.25), transparent 35%),

}

header{

}

.logo{

.nav-buttons{

text-decoration:none;
color:white;
border-radius:14px;

.nav-buttons a:hover{

.hero{
